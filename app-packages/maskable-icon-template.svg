<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (full canvas) -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Safe zone indicator (not part of the final icon) -->
  <rect x="51.2" y="51.2" width="409.6" height="409.6" fill="none" stroke="#444444" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Content circle (place your logo here) -->
  <circle cx="256" cy="256" r="179.2" fill="#FFFFFF"/>
  
  <!-- Example text (replace with your logo) -->
  <text x="256" y="280" font-family="Arial" font-size="120" font-weight="bold" text-anchor="middle" fill="#000000">ML</text>
  
  <!-- Instructions text (remove in final version) -->
  <text x="256" y="40" font-family="Arial" font-size="14" text-anchor="middle" fill="#FFFFFF">Maskable Icon Template</text>
  <text x="256" y="476" font-family="Arial" font-size="14" text-anchor="middle" fill="#FFFFFF">Place logo within dotted "safe zone"</text>
  <text x="256" y="496" font-family="Arial" font-size="14" text-anchor="middle" fill="#FFFFFF">Remove this text before exporting</text>
</svg>